<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEXICON — Word Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050f;--s1:#0c0c20;--s2:#121228;--s3:#1a1a35;
  --cyan:#00e5cc;--gold:#ffc940;--pink:#ff4d8f;--dim:#4a4a7a;
  --txt:#d8d8f0;--txtd:#7070a0;--err:#ff3355;--ok:#33ff88;
  --bord:#1e1e40;--pur:#9b59ff;
}
body{background:var(--bg);color:var(--txt);font-family:'Space Mono',monospace;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 40% at 20% 60%,rgba(0,80,120,.13) 0%,transparent 70%),
  radial-gradient(ellipse 60% 50% at 80% 20%,rgba(60,0,100,.12) 0%,transparent 70%)}
#root{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px 16px 60px}
.app{width:100%;max-width:740px}
.orb{font-family:'Orbitron',sans-serif}
.t-title{font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.05em}
.t-head{font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:.07em}
.t-lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--txtd)}
.panel{background:var(--s1);border:1px solid var(--bord);border-radius:12px;padding:22px}
.inner{background:var(--s2);border:1px solid var(--bord);border-radius:8px;padding:14px}
/* BUTTONS */
.btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:12px;letter-spacing:.09em;
  padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .14s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-p{background:var(--cyan);color:#000;box-shadow:0 0 16px rgba(0,229,204,.28)}
.btn-p:hover{background:#00ffdd;box-shadow:0 0 24px rgba(0,229,204,.45);transform:translateY(-1px)}
.btn-g{background:var(--gold);color:#000;box-shadow:0 0 16px rgba(255,201,64,.28)}
.btn-g:hover{background:#ffd966;transform:translateY(-1px)}
.btn-v{background:var(--pur);color:#fff;box-shadow:0 0 16px rgba(155,89,255,.28)}
.btn-v:hover{background:#b06aff;transform:translateY(-1px)}
.btn-o{background:transparent;color:var(--txtd);border:1.5px solid var(--bord)}
.btn-o:hover{color:var(--txt);border-color:var(--dim)}
.btn-s{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan)}
.btn-s:hover{background:rgba(0,229,204,.09)}
.btn-d{background:transparent;color:var(--err);border:1.5px solid rgba(255,51,85,.35)}
.btn-d:hover{background:rgba(255,51,85,.09)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.sm{font-size:10px;padding:7px 13px;border-radius:6px}
.lg{font-size:14px;padding:14px 32px;border-radius:10px}
.fw{width:100%}
/* INPUTS */
.inp{background:var(--s3);border:1.5px solid var(--bord);color:var(--txt);
  font-family:'Space Mono',monospace;font-size:16px;padding:11px 14px;
  border-radius:8px;width:100%;transition:border-color .14s;outline:none}
.inp:focus{border-color:var(--cyan)}.inp::placeholder{color:var(--dim)}
.inp.ie{border-color:var(--err)}.inp.iok{border-color:var(--ok)}
.bst{width:100%;min-height:68px;background:var(--s3);border:1.5px solid var(--bord);
  border-radius:8px;color:var(--txt);font-family:'Space Mono',monospace;font-size:13px;
  padding:9px 12px;outline:none;resize:vertical;line-height:1.65;transition:border-color .14s}
.bst:focus{border-color:var(--gold)}.bst::placeholder{color:var(--dim)}
/* GUESS ROW */
.grow{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;
  background:var(--s2);border:1px solid var(--bord);animation:slideIn .16s ease-out}
.gword{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;flex:1;
  letter-spacing:.04em;text-transform:uppercase}
.gcnt{font-family:'Orbitron',sans-serif;font-weight:700;font-size:18px;min-width:40px;text-align:right}
.c0{color:var(--dim)}.clo{color:var(--pink)}.cmi{color:var(--gold)}.chi{color:var(--ok)}
/* LETTER GRID */
.agrid{display:grid;grid-template-columns:repeat(13,1fr);gap:4px}
.atile{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:var(--s3);border:1.5px solid var(--bord);border-radius:5px;cursor:pointer;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;color:var(--cyan);
  user-select:none;transition:all .09s}
.atile:hover{border-color:var(--cyan);background:rgba(0,229,204,.07)}
.atile.struck{background:rgba(40,0,15,.18);border-color:rgba(255,51,85,.35);
  color:rgba(255,51,85,.45);text-decoration:line-through;opacity:.55}
.atile.circled{
  background:rgba(51,255,136,.09);
  border:2px solid var(--ok);
  color:var(--ok);
  box-shadow:0 0 0 2px rgba(51,255,136,.25);
  font-weight:900}
/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;
  font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:.09em}
.bc{background:rgba(0,229,204,.12);color:var(--cyan);border:1px solid rgba(0,229,204,.28)}
.bg{background:rgba(255,201,64,.12);color:var(--gold);border:1px solid rgba(255,201,64,.28)}
.bok{background:rgba(51,255,136,.12);color:var(--ok);border:1px solid rgba(51,255,136,.28)}
.be{background:rgba(255,51,85,.12);color:var(--err);border:1px solid rgba(255,51,85,.28)}
.bv{background:rgba(155,89,255,.12);color:var(--pur);border:1px solid rgba(155,89,255,.28)}
/* NOTICES */
.ntc{padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.6}
.ne{background:rgba(255,51,85,.07);border:1px solid rgba(255,51,85,.22);color:#ff8899}
.nok{background:rgba(51,255,136,.07);border:1px solid rgba(51,255,136,.22);color:#33ff88}
.ni{background:rgba(0,229,204,.05);border:1px solid rgba(0,229,204,.18);color:#88dddd}
.nw{background:rgba(255,201,64,.05);border:1px solid rgba(255,201,64,.18);color:var(--gold)}
.nv{background:rgba(155,89,255,.07);border:1px solid rgba(155,89,255,.22);color:#c89aff}
/* LETTER BOXES */
.lbox{width:30px;height:30px;border:2px solid var(--bord);border-radius:5px;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700}
.lbox.rev{border-color:var(--ok);background:rgba(51,255,136,.1);color:var(--ok)}
.lbox.dly{border-color:var(--pur);background:rgba(155,89,255,.1);color:var(--pur)}
/* LEVEL GRID */
.lgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.lbtn{background:var(--s2);border:1.5px solid var(--bord);border-radius:9px;
  padding:12px 5px;text-align:center;cursor:pointer;transition:all .13s}
.lbtn:hover{border-color:var(--cyan);background:rgba(0,229,204,.04);transform:translateY(-2px)}
.lnum{font-family:'Orbitron',sans-serif;font-weight:900;font-size:19px;color:var(--cyan)}
.ldsc{font-size:9px;letter-spacing:.06em;color:var(--txtd);margin-top:3px;line-height:1.4}
/* PLAYER CARD */
.pcard{background:var(--s2);border:1px solid var(--bord);border-radius:10px;padding:11px 15px}
.pcard.me{border-color:var(--cyan);background:rgba(0,229,204,.03)}
.pcard.pw{border-color:var(--ok)}
.pnum{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;background:var(--s3);border:1.5px solid var(--bord)}
.pnum.mi{background:rgba(0,229,204,.17);border-color:var(--cyan);color:var(--cyan)}
/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.scard{background:var(--s2);border:1px solid var(--bord);border-radius:10px;padding:14px 16px}
.sval{font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;margin-bottom:3px}
.slbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txtd)}
/* LEADERBOARD */
.lbrow{display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--s2);border:1px solid var(--bord);border-radius:9px}
.lbrow.top{border-color:var(--gold);background:rgba(255,201,64,.04)}
.lbrow.mrow{border-color:var(--cyan);background:rgba(0,229,204,.04)}
.lbrnk{font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;min-width:28px;text-align:center;color:var(--dim)}
.rg{color:var(--gold)}.rs{color:#aac}.rb{color:#c96}
/* DAILY CARD */
.dcard{background:linear-gradient(135deg,rgba(155,89,255,.12),rgba(0,229,204,.06));
  border:1.5px solid rgba(155,89,255,.35);border-radius:12px;padding:18px}
/* AVATAR */
.avtr{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;
  background:linear-gradient(135deg,rgba(0,229,204,.22),rgba(155,89,255,.22));
  border:2px solid var(--cyan);flex-shrink:0}
/* ROOM CODE */
.rcode{font-family:'Orbitron',sans-serif;font-weight:900;font-size:32px;
  letter-spacing:.22em;color:var(--gold);text-shadow:0 0 18px rgba(255,201,64,.32)}
/* ANIMATIONS */
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 10px var(--cyan)}50%{text-shadow:0 0 26px var(--cyan),0 0 50px var(--cyan)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.ag{animation:glow 2.5s ease-in-out infinite}
.ap{animation:pulse 1.5s ease-in-out infinite}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bord);
  border-top-color:var(--cyan);border-radius:50%;animation:spin .5s linear infinite}
/* FLEX UTILS */
.row{display:flex}.col{display:flex;flex-direction:column}
.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.tc{text-align:center}.w100{width:100%}.wrap{flex-wrap:wrap}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}.g20{gap:20px}
.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}
.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}
.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.div{height:1px;background:var(--bord);margin:16px 0}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dok{background:var(--ok);box-shadow:0 0 6px var(--ok)}.ddim{background:var(--dim)}
.dpul{background:var(--gold);animation:pulse 1.3s ease-in-out infinite}
.nav{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;gap:8px}
@media(max-width:520px){
  .lgrid{grid-template-columns:repeat(3,1fr)}
  .agrid{grid-template-columns:repeat(9,1fr)}
  .sgrid{grid-template-columns:1fr}.panel{padding:16px}
}
</style>
</head>

<script type="text/babel">

// ── Firebase init ─────────────────────────────────────────────

  const c=window.LEXICON_FB;
  if(c?.apiKey!=='YOUR_API_KEY'&&!c?.databaseURL?.includes('YOUR_')){
    firebase.initializeApp(c);db=firebase.database();FB_READY=true;
  }
}catch(e){console.warn('Firebase:',e.message);}

// ── Player identity (localStorage, permanent) ─────────────────
// Username-as-login: MY_ID = normalized username key.
function toKey(n){return n.trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");}
let MY_ID=(()=>{
  const n=localStorage.getItem("lx_name");
  if(n&&n.trim())return toKey(n);
  let id=localStorage.getItem("lx_pid");
  if(!id){id="p"+Math.random().toString(36).substr(2,9)+Date.now().toString(36).substr(-4);localStorage.setItem("lx_pid",id);}
  return id;
})();
function applyUsername(name){MY_ID=toKey(name);localStorage.setItem("lx_name",name.trim());}

// ── Core helpers ──────────────────────────────────────────────
function countShared(a,b){
  const c1={},c2={};
  for(const ch of a.toLowerCase())c1[ch]=(c1[ch]||0)+1;
  for(const ch of b.toLowerCase())c2[ch]=(c2[ch]||0)+1;
  let s=0;for(const ch in c1)if(c2[ch])s+=Math.min(c1[ch],c2[ch]);return s;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function genCode(){const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>ch[Math.floor(Math.random()*ch.length)]).join('');}
function cc(n){return n===0?'c0':n<=2?'clo':n<=5?'cmi':'chi';}
function todayStr(){
  const estOffsetMs = 6 * 60 * 60 * 1000; // UTC-6
  const estNow = new Date(Date.now() - estOffsetMs);
  return estNow.toISOString().slice(0,10);}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}

// ── Daily word (deterministic hash of date string) ────────────
const DAILY_POOL=[
  'crystal','station','journey','balance','fortune','cluster','gravity','thunder','lantern','shimmer',
  'beneath','ancient','capture','freedom','harvest','kindred','morning','pattern','quantum','radiant',
  'shelter','twisted','velvet','wander','zenith','blister','crumble','elegant','fathom','gilded',
  'hostile','insight','kestrel','phantom','quarrel','scandal','tangled','alchemy','bramble','cascade',
  'frenzy','grapple','haunted','jubilee','lattice','mosaic','tempest','vortex','warble','zealous',
  'abandon','cobweb','eclipse','fervent','glacier','herald','impasse','jangle','knuckle','lament',
  'marshal','neglect','prowess','riddle','satchel','vagrant','wrangle','brandish','crimson','embroil',
  'garnish','hallowed','ignite','kindling','lustrous','nectarine','offstage','parsnip','quartzite',
  'rampart','seismic','tableau','unkempt','volcanic','watershed','yearlong','zeppelin','absinthe',
  'brocade','crevice','driftwood','embargo','fastened','grounded','hatchery','immense','jealousy',
];
function hashDate(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return Math.abs(h);}
function getDailyWord(d){return DAILY_POOL[hashDate(d)%DAILY_POOL.length];}

// ── Word validation (Merriam-Webster Collegiate + fallback + allowlist) ─
// Common grammatical words that APIs sometimes reject (is, was, are, etc.)
const WORD_ALLOWLIST=new Set([
  'been','came','come','does','done','each','from','gave','give','goes',
  'gone','have','here','just','keep','know','last','left','like','look',
  'made','make','more','most','much','must','name','need','next','once',
  'only','open','over','said','same','seem','show','some','such','take',
  'tell','than','that','them','then','they','this','time','very','want',
  'were','what','when','will','with','your',
]);
const MW_KEY=window.LEXICON_MW_KEY;
const MW_READY=MW_KEY&&MW_KEY!=='YOUR_MW_KEY';

async function validateWord(word){
  const w=word.toLowerCase().trim();
  if(!/^[a-z]+$/.test(w))return{valid:false,reason:'Letters only'};
  if(w.length<2)return{valid:false,reason:'Too short'};
  // Always accept core grammatical words the dictionary API may reject
  if(WORD_ALLOWLIST.has(w))return{valid:true,reason:''};
  try{
    if(MW_READY){
      // Merriam-Webster Collegiate Dictionary API
      const r=await fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${w}?key=${MW_KEY}`);
      if(!r.ok)throw new Error('MW unavailable');
      const data=await r.json();
      // Valid = array of entry objects; invalid = array of suggestion strings or []
      if(Array.isArray(data)&&data.length>0&&typeof data[0]==='object'){
        return{valid:true,reason:''};
      }
      return{valid:false,reason:`"${w}" not found in Merriam-Webster`};
    }else{
      // Fallback: dictionaryapi.dev (Wiktionary-based)
      const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);
      if(r.status===404)return{valid:false,reason:`"${w}" not in dictionary`};
      if(!r.ok)throw new Error('API error');
      return{valid:true,reason:''};
    }
  }catch(e){return{valid:true,reason:'(offline – skipped check)'};}
}
// ── Word lists ────────────────────────────────────────────────
const W={
  4:['able','back','ball','bank','bell','bird','blue','bold','book','burn','cake','call','card','cave',

     'pain','pale','palm','park','past','path','peak','peel','pick','pile','pine','pipe','plan','play',
     'plot','plug','plum','poem','pole','pond','pool','port','pose','pull','pure','push','race','rack',

     'robe','rock','role','roll','roof','root','rope','rose','rule','rush','rust','sage','sail','salt',
     'sand','save','seal','seed','seek','send','shed','ship','shop','show','shut','silk','sing','sink',
     'site','size','slim','slip','slow','snap','snow','soap','soft','soil','sole','song','sore','soul',
     'star','stem','step','stop','tale','tall','tame','tank','tape','teal','team','tide','tile','tilt',
     'toll','tome','tone','town','tree','trek','trim','trio','trip','twig','twin','type','vale','vane',
     'vase','vast','veil','vein','view','vine','void','vote','wade','wake','walk','wall','ward','warm',
     'wash','wasp','wave','weed','well','wide','wife','will','wind','wine','wire','wolf','wood','wool',
     'word','work','wren','yard','year','zone'],

    catch(e){return false;}
  },
  async saveProfile(name){

  },
  async loadAccount(name){
    applyUsername(name);
    if(!db)return{stats:null,streak:null};

      const [ss,ts]=await Promise.all([
        db.ref(`lexicon/stats/${MY_ID}`).once("value"),
        db.ref(`lexicon/streaks/${MY_ID}`).once("value"),
      ]);
      return{stats:ss.val()||null,streak:ts.val()||null};
    }catch(e){return{stats:null,streak:null};}
  },
  async getProfile(){
    const ln=localStorage.getItem("lx_name")||"";
    if(!db)return{name:ln};

    catch(e){return{name:ln};}
  },

  async recordSoloWin(level,ng){

    localStorage.setItem(k,JSON.stringify({wins:c.wins+1,plays:c.plays+1,tg:c.tg+ng}));
    if(!db)return;
    const ref=db.ref(`lexicon/stats/${MY_ID}/solo/${level}`);
    const snap=await ref.once('value');const cur=snap.val()||{wins:0,plays:0,tg:0};
    await ref.set({wins:cur.wins+1,plays:cur.plays+1,tg:cur.tg+ng});
  },
  async recordSoloPlay(level){
    const k=`lx_s${level}`;
    const c=JSON.parse(localStorage.getItem(k)||'{"wins":0,"plays":0,"tg":0}');

  async submitDailyScore(name,guesses,dateStr,guessCounts){
    localStorage.setItem(`lx_d${dateStr}`,guesses);
    if(guessCounts)localStorage.setItem(`lx_dc${dateStr}`,JSON.stringify(guessCounts));
    if(!db)return;

  async _updateStreak(dateStr){
    if(!db)return;
    const ref=db.ref(`lexicon/streaks/${MY_ID}`);
    const snap=await ref.once('value');const cur=snap.val()||{current:0,best:0,lastCompleted:null};
    if(cur.lastCompleted===dateStr)return;
    const newCur=cur.lastCompleted===yesterdayStr()?cur.current+1:1;

  async getMyStreak(){
    if(!db)return{current:0,best:0,lastCompleted:null};
    try{const s=await db.ref(`lexicon/streaks/${MY_ID}`).once('value');return s.val()||{current:0,best:0,lastCompleted:null};}

  // Leaderboard
  async getLeaderboard(dateStr){
    if(!db)return[];
    try{
      const s=await db.ref(`lexicon/daily/${dateStr}/scores`).once('value');
      if(!s.exists())return[];
      return Object.entries(s.val()).map(([pid,v])=>({...v,pid})).sort((a,b)=>a.guesses-b.guesses||a.ts-b.ts);
    }catch(e){return[];}
  },
  // Multiplayer rooms
  async createRoom(name){
    const code=genCode();
    await db.ref(`lexicon/rooms/${code}`).set({host:MY_ID,phase:'lobby',createdAt:Date.now(),players:{[MY_ID]:{name,joinedAt:Date.now(),online:true}}});
    db.ref(`lexicon/rooms/${code}/players/${MY_ID}/online`).onDisconnect().set(false);
    return code;
  },
  async joinRoom(code,name){
    const snap=await db.ref(`lexicon/rooms/${code}`).once('value');
    if(!snap.exists())throw new Error('Room not found');
    const r=snap.val();
    if(r.phase==='playing'||r.phase==='done')throw new Error('Game already in progress');
    await db.ref(`lexicon/rooms/${code}/players/${MY_ID}`).set({name,joinedAt:Date.now(),online:true});
    db.ref(`lexicon/rooms/${code}/players/${MY_ID}/online`).onDisconnect().set(false);
    return code;
  },
  async startWordPhase(code){await db.ref(`lexicon/rooms/${code}/phase`).set('words');},
  async submitWord(code,word){
    await db.ref(`lexicon/rooms/${code}/words/${MY_ID}`).set(word);
    await db.ref(`lexicon/rooms/${code}/players/${MY_ID}/wordSet`).set(true);
  },
  async dealAssignments(code,players,words){
    const pids=Object.keys(players);const order=shuffle(pids);const asgn={};
    order.forEach((pid,i)=>{const t=order[(i+1)%order.length];asgn[pid]={targetId:t,targetName:players[t].name,mystery:words[t]};});
    await db.ref(`lexicon/rooms/${code}`).update({phase:'playing',order,assignments:asgn,startedAt:Date.now()});
  },
  async submitGuess(code,word,count,mystery,total){
    await db.ref(`lexicon/rooms/${code}/guesses/${MY_ID}`).push({word,count,ts:Date.now()});
    if(word===mystery)await db.ref(`lexicon/rooms/${code}/solved/${MY_ID}`).set({numGuesses:total+1,ts:Date.now()});
  },
  async finishGame(code){await db.ref(`lexicon/rooms/${code}/phase`).set('done');},
};

    if(!db||!code){setLoading(false);return;}
    const ref=db.ref(`lexicon/rooms/${code}`);
    const h=s=>{setLoading(false);s.exists()?setRoom(s.val()):setErr('Room not found');};
    ref.on('value',h,e=>{setErr(e.message);setLoading(false);});
    return()=>ref.off('value',h);
  },[code]);
  return{room,loading,err};
}
function useMyGuesses(code){
  const [guesses,setGuesses]=useState([]);
  useEffect(()=>{
    if(!db||!code)return;
    const ref=db.ref(`lexicon/rooms/${code}/guesses/${MY_ID}`);
    const h=s=>{s.exists()?setGuesses(Object.values(s.val()).sort((a,b)=>a.ts-b.ts)):setGuesses([]);};
    ref.on('value',h);return()=>ref.off('value',h);
  },[code]);
  return guesses;
}

function LetterGrid(){
  // states: null | 'struck' (single-click, eliminated) | 'circled' (double-click, selected/confirmed)
  const [states,setStates]=useState({});
  const lastClick=useRef({});

  function handleClick(l){
    const now=Date.now();
    const last=lastClick.current[l]||0;
    const isDouble=now-last<400;
    lastClick.current[l]=now;

    setStates(prev=>{
      const next={...prev};
      if(isDouble){
        // double-click: cycle → struck, or clear if already struck
        next[l]=prev[l]==='circled'?null:'circled';
      } else {
        // single-click: eliminate
        next[l]=prev[l]==='struck'?null:'struck';
      }
      return next;
    });
  }

  function reset(){setStates({});}
  const circledCount=Object.values(states).filter(v=>v==='circled').length;
  const struckCount=Object.values(states).filter(v=>v==='struck').length;
  const anyMarked=circledCount>0||struckCount>0;

  return(
    <div className="inner mt12">
      <div className="row ac jb mb8">
        <div>
          <span className="t-lbl">Letter Tracker</span>
          <span style={{fontSize:'10px',color:'var(--dim)',marginLeft:'7px'}}>
            single-click to eliminate · double-click to confirm
          </span>
        </div>
        {anyMarked&&<button className="btn btn-o sm" onClick={reset}>RESET</button>}
      </div>
      <div className="agrid">
        {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>{
          const st=states[l]||null;
          return(
            <div key={l}
              className={`atile${st==='circled'?' circled':st==='struck'?' struck':''}`}
              onClick={()=>handleClick(l)}
              title={st==='struck'?l+' — eliminated':st==='circled'?l+' — confirmed present':'Click: eliminate · Double-click: confirm'}
            >{l}</div>
          );
        })}
      </div>
      {anyMarked&&(
        <div style={{marginTop:'6px',fontSize:'10px',color:'var(--dim)',display:'flex',gap:'14px'}}>
          {circledCount>0&&<span><span style={{color:'var(--ok)',fontWeight:'700'}}>{circledCount}</span> confirmed</span>}
          {struckCount>0&&<span><span style={{color:'var(--err)',fontWeight:'700'}}>{struckCount}</span> eliminated</span>}
        </div>
      )}
    </div>
  );
}

function GuessInput({onSubmit,disabled,ph='Enter any English word…'}){
  const [val,setVal]=useState('');const [st,setSt]=useState(null);const [msg,setMsg]=useState('');
  const ref=useRef();
  useEffect(()=>{if(!disabled&&ref.current)ref.current.focus();},[disabled]);
  async function handle(e){
    e.preventDefault();const w=val.trim().toLowerCase();if(!w)return;
    if(w.length<4){setSt('err');setMsg('Guesses must be at least 4 letters');return;}
    setSt('load');setMsg('');

    if(!valid){setSt('err');setMsg(reason);return;}
    setSt('ok');onSubmit(w);setVal('');setSt(null);setMsg('');
    setTimeout(()=>ref.current?.focus(),40);
  }
  return(
    <form onSubmit={handle} className="row g8" style={{alignItems:'flex-end'}}>
      <div style={{flex:1}}>
        <input ref={ref} className={`inp${st==='err'?' ie':''}`} value={val}

  );
}

// Share Results
function ShareButton({guesses,guessCount,storedCounts,dateStr,streakCount}){
  const [copied,setCopied]=useState(false);

  // Map a shared-letter count to a coloured square
  // 0-2 → 🟥 red, 3-5 → 🟨 yellow, 6+ → 🟩 green, exact match → 🟦 blue
  function countToBox(count, isLast){
    if(isLast) return '🟦'; // blue = solved
    if(count<=2) return '🟥'; // red
    if(count<=5) return '🟨'; // yellow
    return '🟩'; // green
  }

  function buildText(){
    // Build boxes: prefer live guesses array, fall back to stored counts, fall back to plain count
    let boxes;
    const counts=guesses?guesses.map(g=>g.count):(storedCounts||null);
    const total=guesses?guesses.length:(guessCount||0);
    if(counts&&counts.length===total){
      boxes=counts.map((cnt,i)=>countToBox(cnt,i===total-1)).join('');
    } else {
      // Fallback: all red then blue
      boxes=Array.from({length:total},(_,i)=>i===total-1?'🟦':'🟥').join('');
    }
    const lines=[
      'LEXICON Challenge — '+dateStr,
      'Solved in '+total+' '+(total===1?'guess':'guesses'),
      boxes,
    ];
    if(streakCount>0)lines.push('🔥 '+streakCount+'-day streak');
    lines.push('','Play at: https://sites.google.com/view/lexiconchallenge/home');
    return lines.join('\n');
  }
  async function share(){
    const text=buildText();
    try{
      if(navigator.share){await navigator.share({text});}
      else{await navigator.clipboard.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),2200);}
    }catch(e){
      try{
        const ta=document.createElement("textarea");
        ta.value=text;ta.style.cssText="position:fixed;opacity:0";
        document.body.appendChild(ta);ta.select();document.execCommand("copy");
        document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2200);
      }catch(err){}
    }
  }
  return(
    <button className="btn btn-s fw mt8" onClick={share} style={{fontSize:"12px",letterSpacing:".06em"}}>
      {copied?"✓ COPIED TO CLIPBOARD!":"📋 SHARE RESULTS"}
    </button>
  );
}

function SoloGame({level,onBack}){
  const cfg=LVL[level];
  const [mystery,setMystery]=useState(()=>rword(cfg.len));
  const [guesses,setGuesses]=useState([]);
  const [won,setWon]=useState(false);
  const [revealed,setRevealed]=useState(false);
  const [statSaved,setStatSaved]=useState(false);
  const [playSaved,setPlaySaved]=useState(false);

  // Record play on first guess
  useEffect(()=>{
    if(guesses.length===1&&!playSaved){setPlaySaved(true);FB.recordSoloPlay(level).catch(()=>{});}
  },[guesses.length]);

  async function onGuess(word){
    if(won)return;
    const count=countShared(word,mystery);
    const next=[...guesses,{word,count}];setGuesses(next);
    if(word===mystery){
      setWon(true);
      if(!statSaved){setStatSaved(true);await FB.recordSoloWin(level,next.length);}
    }
  }
  function restart(){setMystery(rword(cfg.len));setGuesses([]);setWon(false);setRevealed(false);setStatSaved(false);setPlaySaved(false);}

  return(
    <div className="app">
      <div className="nav">
        <button className="btn btn-o sm" onClick={onBack}>← LEVELS</button>
        <div className="row ac g8">
          <span className="bdg bc">{cfg.lbl}</span>
          {level<7&&<span style={{fontSize:"10px",color:"var(--dim)"}}>{mystery.length} letters</span>}
          {level>=7&&!won&&<span style={{fontSize:"10px",color:"var(--dim)"}}>length hidden</span>}
          {level>=7&&won&&<span style={{fontSize:"10px",color:"var(--ok)"}}>{mystery.length} letters</span>}
        </div>
        <button className="btn btn-o sm" onClick={restart}>↺ NEW</button>
      </div>
      <div className="panel">
        <div className="tc mb16">
          <div className="t-lbl mb8">Mystery Word</div>
          <MysteryBoxes length={mystery.length} won={won} word={mystery} hideLength={level>=7}/>
        </div>
        {!won&&!revealed&&<><div className="div"/><GuessInput onSubmit={onGuess}/></>}
        {won&&(
          <div className="tc mt10 mb4">
            <div style={{fontSize:'26px',marginBottom:'5px'}}>🎉</div>
            <div className="t-head" style={{color:'var(--ok)',fontSize:'17px',marginBottom:'4px'}}>SOLVED!</div>
            <div style={{color:'var(--txtd)',fontSize:'12px',marginBottom:'14px'}}>{guesses.length} {guesses.length===1?'guess':'guesses'}</div>
            <button className="btn btn-p" onClick={restart}>PLAY AGAIN</button>
          </div>
        )}
        {!won&&!revealed&&guesses.length>=3&&<div className="tc mt10"><button className="btn btn-d sm" onClick={()=>setRevealed(true)}>Give Up</button></div>}
        {revealed&&<div className="tc mt10"><button className="btn btn-g" onClick={restart}>TRY AGAIN</button></div>}
        <div className="div"/>
        <div style={{fontWeight:'700',fontSize:'11px',color:'var(--txtd)',letterSpacing:'.1em',marginBottom:'10px'}}>
          GUESSES <span style={{color:'var(--cyan)'}}>{guesses.length}</span>
          <span style={{fontWeight:'400',marginLeft:'8px',fontSize:'10px',color:'var(--dim)'}}>(newest first)</span>
        </div>
        <GuessList guesses={guesses} mysteryWord={mystery} revealed={revealed}/>
        <LetterGrid/>
        <BrainstormBox/>
      </div>
    </div>
  );
}

  async function submit(e){

    if(w.length<4||w.length>9){setErr('Word must be 4–9 letters');return;}
    setSubmitting(true);setErr('');

function MultiGame({code,room,myName}){
  const guesses=useMyGuesses(code);
  const [submitting,setSubmitting]=useState(false);
  const [winSaved,setWinSaved]=useState(false);
  const [playSaved,setPlaySaved]=useState(false);
  const asgn=(room.assignments||{})[MY_ID];
  const solved=room.solved||{};const players=room.players||{};
  const mySolved=!!solved[MY_ID];

  // Record multi play on first guess
  useEffect(()=>{
    if(guesses.length===1&&!playSaved){setPlaySaved(true);FB.recordMultiPlay().catch(()=>{});}
  },[guesses.length]);
  // Record multi win
  useEffect(()=>{
    if(mySolved&&!winSaved){setWinSaved(true);FB.recordMultiWin().catch(()=>{});}
  },[mySolved,winSaved]);
  // Auto-finish when all solved
  useEffect(()=>{
    if(!room||room.phase!=='playing')return;
    if(Object.keys(solved).length>=Object.keys(players).length)FB.finishGame(code).catch(()=>{});
  },[solved,players,room,code]);

  if(!asgn)return(<div className="app"><div className="panel tc" style={{padding:'60px'}}><div className="spin" style={{width:'22px',height:'22px',margin:'0 auto 12px'}}/><div style={{color:'var(--dim)'}}>Loading assignment…</div></div></div>);

  async function onGuess(word){
    if(mySolved||submitting)return;setSubmitting(true);
    const count=countShared(word,asgn.mystery);
    await FB.submitGuess(code,word,count,asgn.mystery,guesses.length);
    setSubmitting(false);
  }

  return(
    <div className="app">
      <div className="nav">
        <div className="row ac g8"><span className="bdg bg">{code}</span><span style={{fontSize:'11px',color:'var(--dim)'}}>online</span></div>
        <div className="row ac g6"><div className="dot dok"/><span style={{fontSize:'11px',color:'var(--txtd)'}}>{myName}</span></div>
      </div>
      <div className="panel">
        <div className="row ac jb mb12 wrap g10">
          <div><div className="t-lbl mb4">Guessing word set by</div><div className="t-head" style={{fontSize:'18px',color:'var(--gold)'}}>{asgn.targetName}</div></div>
          <div className="tc"><div className="t-lbl mb4">Length</div><div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:'900',fontSize:'24px',color:'var(--cyan)'}}>{asgn.mystery.length}</div></div>
        </div>
        <div className="tc mb12"><MysteryBoxes length={asgn.mystery.length} won={mySolved} word={asgn.mystery}/></div>
        {!mySolved&&<><div className="div"/><GuessInput onSubmit={onGuess} disabled={mySolved||submitting} ph={`Guess ${asgn.targetName}'s mystery word…`}/></>}
        {mySolved&&<div className="ntc nok tc mt10 mb4">🎉 Solved in {solved[MY_ID]?.numGuesses} guesses! Watching others finish…</div>}
        <div className="div"/>
        <div className="t-lbl mb10">GAME PROGRESS</div>
        <div className="col g6 mb14">
          {Object.entries(players).map(([pid,p])=>{
            const s=solved[pid];const isSelf=pid===MY_ID;
            return(
              <div key={pid} className={`pcard row ac g10${s?' pw':''}${isSelf?' me':''}`} style={{padding:'9px 13px'}}>
                <div className={`pnum${isSelf?' mi':''}`}>{s?'✓':<span className="spin" style={{width:'10px',height:'10px'}}/>}</div>
                <div style={{flex:1,fontSize:'13px'}}>
                  <span style={{fontWeight:'700'}}>{p.name}</span>{isSelf&&<span style={{fontSize:'10px',color:'var(--cyan)',marginLeft:'6px'}}>(you)</span>}
                  <div style={{fontSize:'10px',color:'var(--dim)'}}>→ {(room.assignments||{})[pid]?.targetName}'s word</div>
                </div>
                <div>{s?<span style={{color:'var(--ok)',fontFamily:"'Orbitron',sans-serif",fontWeight:'700',fontSize:'12px'}}>{s.numGuesses}g</span>:<span style={{color:'var(--dim)',fontSize:'12px'}}>…</span>}</div>
              </div>
            );
          })}
        </div>
        <div style={{fontWeight:'700',fontSize:'11px',color:'var(--txtd)',letterSpacing:'.1em',marginBottom:'10px'}}>
          YOUR GUESSES <span style={{color:'var(--cyan)'}}>{guesses.length}</span>
          <span style={{fontWeight:'400',marginLeft:'8px',fontSize:'10px',color:'var(--dim)'}}>(newest first)</span>
        </div>
        <GuessList guesses={guesses} mysteryWord={asgn.mystery} revealed={false}/>
        <LetterGrid/>
        <BrainstormBox/>
      </div>
    </div>
  );
}

function MultiResults({code,room,onBack}){
  const players=room.players||{};const solved=room.solved||{};const asgns=room.assignments||{};
  const sorted=Object.entries(players).sort(([a],[b])=>{
    const sa=solved[a],sb=solved[b];
    if(sa&&!sb)return-1;if(!sa&&sb)return 1;
    if(sa&&sb)return sa.numGuesses-sb.numGuesses||sa.ts-sb.ts;
    return 0;
  });
  return(
    <div className="app">
      <div className="panel tc">
        <div style={{fontSize:'36px',marginBottom:'8px'}}>🏆</div>
        <div className="t-head" style={{fontSize:'19px',color:'var(--gold)',marginBottom:'4px'}}>GAME OVER</div>
        <div style={{color:'var(--txtd)',fontSize:'12px',marginBottom:'18px'}}>Room {code} · Final Results</div>
        <div className="col g8 mb18">
          {sorted.map(([pid,p],i)=>{
            const s=solved[pid];const a=asgns[pid];const isSelf=pid===MY_ID;
            return(
              <div key={pid} className={`pcard row ac g12${isSelf?' me':''}`} style={i===0?{borderColor:'var(--gold)',background:'rgba(255,201,64,.04)'}:{}}>
                <div style={{width:'22px',textAlign:'center',fontSize:'16px'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`}</div>
                <div style={{flex:1,textAlign:'left'}}>
                  <div style={{fontWeight:'700',fontSize:'13px'}}>{p.name}{isSelf&&<span style={{fontSize:'10px',color:'var(--cyan)',marginLeft:'6px'}}>(you)</span>}</div>
                  {a&&<div style={{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}>Solved: <span style={{color:'var(--cyan)',textTransform:'uppercase'}}>{a.mystery}</span> (by {a.targetName})</div>}
                </div>
                <div>{s?<span style={{color:'var(--ok)',fontFamily:"'Orbitron',sans-serif",fontWeight:'700',fontSize:'14px'}}>{s.numGuesses}g</span>:<span className="bdg be">DNF</span>}</div>
              </div>
            );
          })}
        </div>
        <button className="btn btn-p lg" onClick={onBack}>BACK TO MENU</button>
      </div>
    </div>
  );
}

function MultiCtrl({code,myName,onBack}){
  const {room,loading,err}=useRoom(code);
  if(loading)return(<div className="app"><div className="panel tc" style={{padding:'60px'}}><div className="spin" style={{width:'24px',height:'24px',margin:'0 auto 14px'}}/><div style={{color:'var(--dim)'}}>Connecting to room {code}…</div></div></div>);
  if(err)return(<div className="app"><div className="panel tc"><div className="ntc ne mb12">{err}</div><button className="btn btn-o" onClick={onBack}>← BACK</button></div></div>);
  if(!room)return null;
  if(room.phase==='lobby')return<MultiLobby code={code} room={room} myName={myName}/>;
  if(room.phase==='words')return<MultiWordEntry code={code} room={room}/>;
  if(room.phase==='playing')return<MultiGame code={code} room={room} myName={myName}/>;
  if(room.phase==='done')return<MultiResults code={code} room={room} onBack={onBack}/>;
  return null;
}

// ═══════════════════════════════════════════════════
//  ROOT APPLICATION
// ═══════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState('home');
  const [soloLevel,setSoloLevel]=useState(null);
  const [roomCode,setRoomCode]=useState(null);
  const [myName,setMyName]=useState('');
  const [dailyDone,setDailyDone]=useState(false);
  const [playerName,setPlayerName]=useState(()=>localStorage.getItem('lx_name')||'');

  useEffect(()=>{
    FB.hasDoneDaily(todayStr()).then(d=>setDailyDone(d));
    FB.getProfile().then(p=>{if(p?.name)setPlayerName(p.name);});
  },[]);

  function goHome(dest){
    setRoomCode(null);
    if(dest==='leaderboard'){setScreen('leaderboard');return;}
    setScreen('home');
    FB.hasDoneDaily(todayStr()).then(d=>setDailyDone(d));
  }

  function refreshName(){FB.getProfile().then(p=>{if(p?.name)setPlayerName(p.name);});}

  switch(screen){
    case 'home':        return<Home onSolo={()=>setScreen('solo-lvl')} onMulti={()=>setScreen(FB_READY?'multi-home':'fb-setup')} onDaily={()=>setScreen('daily')} onBoard={()=>setScreen('leaderboard')} onProfile={()=>setScreen('profile')} playerName={playerName} dailyDone={dailyDone}/>;
    case 'profile':     return<ProfilePage onBack={()=>setScreen('home')} onNameSaved={n=>{setPlayerName(n);FB.hasDoneDaily(todayStr()).then(d=>setDailyDone(d));}}/>;
    case 'daily':       return<DailyChallenge onBack={goHome} playerName={playerName}/>;
    case 'leaderboard': return<Leaderboard onBack={()=>setScreen('home')}/>;
    case 'solo-lvl':    return<LevelSelect onSelect={l=>{setSoloLevel(l);setScreen('solo-game');}} onBack={()=>setScreen('home')}/>;
    case 'solo-game':   return<SoloGame level={soloLevel} onBack={()=>setScreen('solo-lvl')}/>;
    case 'fb-setup':    return<FBSetup onBack={()=>setScreen('home')}/>;
    case 'multi-home':  return<MultiHome onBack={()=>setScreen('home')} onJoin={(c,n)=>{setRoomCode(c);setMyName(n);setScreen('multi-room');}} playerName={playerName}/>;
    case 'multi-room':  return<MultiCtrl code={roomCode} myName={myName} onBack={()=>setScreen('home')}/>;
    default:            return null;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
